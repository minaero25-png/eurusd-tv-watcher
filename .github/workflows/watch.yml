name: TV Signal Watcher

on:
  schedule:
    # Every 30 min at :02 and :32 UTC (slight buffer after M30 candle close)
    - cron: '2,32 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tv-signal-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
        run: python watch.py

      - name: Commit state if changed
        run: |
          git config user.name "tv-signal-watcher[bot]"
          git config user.email "tv-signal-watcher@users.noreply.github.com"
          if ! git diff --quiet state.json; then
            git add state.json
            git commit -m "state: update TV signals [skip ci]"
            git push
          else
            echo "No state change to commit"
          fi
