name: TV Signal Watcher

on:
  # Triggered externally by cron-job.org (reliable scheduler) — see README
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tv-signal-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
        run: python watch.py

      - name: Commit state if changed
        run: |
          git config user.name "tv-signal-watcher[bot]"
          git config user.email "tv-signal-watcher@users.noreply.github.com"
          if git diff --quiet state.json; then
            echo "No state change to commit"
            exit 0
          fi
          git add state.json
          git commit -m "state: update TV signals [skip ci]"
          for i in 1 2 3; do
            # -X theirs = if state.json conflicts during rebase, this run wins
            # (this run's TV reco was read later = freshest)
            if git pull --rebase -X theirs origin main; then
              git push && exit 0
            else
              # rebase failed → abort so working tree is clean before retry
              git rebase --abort 2>/dev/null || true
            fi
            echo "push attempt $i failed, retrying..."
            sleep $((i * 3))
          done
          echo "❌ failed to push state after 3 attempts"
          exit 1
